name: Generate Pacman

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Pacman SVG
        uses: Yue-Sun/pacman-contribution-graph@main
        with:
          github_user_name: contiaraujo
          # As cores do Tokyo Night que combinam com seu perfil
          github_graph_colors: "#1a1b26, #7aa2f7, #bb9af7, #f7768e, #9ece6a"

      - name: Push to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
